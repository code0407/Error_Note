<html lang="zh-CN">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="theme-color" content="#1976d2" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>错题本 · 高效复习</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>

/* ============================================================
   错题本 —— 移动端优先的全局样式
   ============================================================ */
:root {
  --primary: #1976d2;
  --primary-light: #42a5f5;
  --primary-bg: #e3f2fd;
  --success: #43a047;
  --warn: #f57c00;
  --danger: #e53935;
  --text: #212121;
  --text-sub: #666;
  --text-mute: #999;
  --bg: #f5f6f8;
  --card: #ffffff;
  --border: #e7e9ee;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
  --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --fs: 15px;
}
html[data-theme='dark'] {
  --primary: #64b5f6;
  --primary-light: #90caf9;
  --primary-bg: #1e2d3d;
  --success: #81c784;
  --warn: #ffb74d;
  --danger: #ef5350;
  --text: #e6e6e6;
  --text-sub: #a9a9a9;
  --text-mute: #777;
  --bg: #0f1115;
  --card: #1a1d22;
  --border: #282b31;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow: 0 4px 16px rgba(0,0,0,.4);
}
html[data-font='large'] { --fs: 17px; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
  font-size: var(--fs);
  color: var(--text);
  background-color: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* 顶部栏 */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  padding-top: calc(var(--safe-top) + 12px);
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
}
.top-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: none; font-size: 16px;
  cursor: pointer;
}

/* 主内容 */
#mainView {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 16px calc(92px + var(--safe-bottom) + 16px);
  min-height: calc(100vh - 56px - var(--safe-top));
}

/* 底部 Tab */
.bottom-tab {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-around;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(var(--safe-bottom) + 8px);
  box-shadow: 0 -2px 12px rgba(0,0,0,.06);
}
.tab-item {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 0;
  color: var(--text-mute);
  cursor: pointer;
  font-size: 12px;
}
.tab-icon { font-size: 22px; }
.tab-item.active { color: var(--primary); }

/* 卡片 */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 18px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 16px; font-weight: 600;
  color: var(--text);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: '';
  width: 4px; height: 16px;
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 100%);
  border-radius: 2px;
}

/* 表单控件 */
label.f-label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-sub); margin-bottom: 8px;
}
input[type=text], input[type=search], input[type=number], select, textarea {
  width: 100%;
  padding: 12px 14px;
  font-size: var(--fs);
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
textarea {
  min-height: 110px; resize: vertical;
  line-height: 1.6;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(25,118,210,.12);
}
.f-row { display: flex; gap: 10px; }
.f-row > * { flex: 1; }
.f-group { margin-bottom: 16px; }

/* 按钮 */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px;
  font-size: var(--fs); font-weight: 500;
  border-radius: 10px;
  border: none; cursor: pointer;
  background: #eee; color: var(--text);
  transition: transform .15s, opacity .2s, box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; box-shadow: 0 4px 14px rgba(25,118,210,.28);
}
.btn-ghost { background: var(--primary-bg); color: var(--primary); }
.btn-danger { background: #ffebee; color: var(--danger); }
.btn-block { display: flex; width: 100%; }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* 标签 */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px;
  background: var(--primary-bg); color: var(--primary);
  border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 500;
  margin: 0 6px 6px 0;
  cursor: pointer;
}
.chip.del { padding-right: 8px; }
.chip .x { margin-left: 4px; opacity: .7; }
.chip .x:hover { opacity: 1; }
.star {
  display: inline-flex; gap: 2px;
}
.star span { font-size: 22px; color: #ddd; cursor: pointer; }
.star span.on { color: #ffb300; }

/* 统计卡片 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-cell {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-size: 26px; font-weight: 700;
  color: var(--primary); line-height: 1;
}
.stat-label {
  font-size: 12px; color: var(--text-sub); margin-top: 6px;
}

/* 快捷入口 */
.quick-btns {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.quick-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  border: 1px solid var(--border);
}
.quick-item:active { transform: scale(0.98); }
.quick-item .qi { font-size: 28px; margin-bottom: 4px; }
.quick-item .qt { font-size: 13px; font-weight: 500; color: var(--text); }

/* 今日复习 */
.today-list .tl {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  border-left: 4px solid var(--warn);
  box-shadow: var(--shadow-sm);
  font-size: 13px;
}
.today-list .tl.ok { border-left-color: var(--success); opacity: .7; }
.today-list .tl .tl-title { font-weight: 600; margin-bottom: 3px; }

/* 错题条目 */
.q-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--primary);
  cursor: pointer;
}
.q-item.fav { border-left-color: #ffb300; }
.q-item.mastered { border-left-color: var(--success); opacity: .7; }
.q-top { display: flex; justify-content: space-between; align-items: flex-start; }
.q-subject {
  display: inline-block; padding: 2px 10px;
  background: var(--primary-bg); color: var(--primary);
  border-radius: var(--radius-pill); font-size: 12px; font-weight: 600;
}
.q-body {
  font-size: 14px; line-height: 1.55; color: var(--text);
  margin: 8px 0 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.q-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--text-sub); }
.q-actions { display: flex; gap: 8px; margin-top: 10px; }

/* 筛选条 */
.filter-bar {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-row select, .filter-row input { flex: 1; min-width: 90px; padding: 8px 12px; }

/* 刷题卡片 */
.review-wrap {
  display: flex; flex-direction: column; gap: 14px;
}
.review-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 22px 20px;
  box-shadow: var(--shadow);
  min-height: 260px;
}
.review-tag { display: inline-block; padding: 3px 10px;
  background: var(--primary-bg); color: var(--primary);
  border-radius: 20px; font-size: 12px; margin-right: 6px; }
.review-tag.d { background: #ffebee; color: var(--danger); }
.review-tag.s { background: var(--primary-bg); color: var(--primary); }
.review-q {
  font-size: 16px; line-height: 1.6; margin-top: 12px;
  white-space: pre-wrap; word-break: break-word;
}
.review-pic { width: 100%; margin-top: 12px; border-radius: 10px; }
.review-answer-wrap {
  margin-top: 16px; padding-top: 16px;
  border-top: 1px dashed var(--border);
}
.review-answer { font-size: 15px; line-height: 1.6; color: var(--text); }
.review-wrong { background: #ffebee; padding: 10px 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
.review-reason { background: #fff8e1; padding: 10px 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; }

.review-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.review-dot { font-size: 14px; color: var(--text-sub); }
.review-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* 模态 */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 200;
  animation: fade .18s ease;
}
@keyframes fade { from {opacity:0} to {opacity:1} }
.modal-sheet {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 600px;
  max-height: 85vh; overflow-y: auto;
  animation: up .25s ease;
}
@keyframes up { from { transform: translateY(40px); opacity: 0.5;} to { transform: translateY(0); opacity: 1;} }
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--card);
}
.modal-head h3 { font-size: 16px; font-weight: 600; }
.modal-x {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg); border: none; cursor: pointer; font-size: 16px;
}
.modal-body { padding: 16px 18px; }

/* Toast */
.toast {
  position: fixed; left: 50%; bottom: 120px; transform: translateX(-50%);
  background: rgba(30,30,30,.92); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 14px; z-index: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

/* 空状态 */
.empty {
  text-align: center; padding: 50px 20px; color: var(--text-mute);
}
.empty .ee { font-size: 56px; margin-bottom: 8px; }

/* 图表 */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row {
  display: grid;
  grid-template-columns: 80px 1fr 40px;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.bar-track {
  height: 22px; background: var(--border); border-radius: 11px; overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 11px;
  transition: width .6s ease;
}
.bar-row .v { color: var(--text-sub); font-weight: 600; }

.pie-wrap {
  display: flex; align-items: center; justify-content: center; gap: 18px;
  padding: 14px 0;
  flex-wrap: wrap;
}
.pie-legend {
  display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-sub);
}
.pie-legend .l { display: flex; align-items: center; gap: 6px; }
.pie-legend .d { width: 10px; height: 10px; border-radius: 3px; }

/* 进度 */
.progress-box { padding: 14px 0; }
.progress-title { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
.progress-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #66bb6a); border-radius: 4px; transition: width .5s; }
.progress-v { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

/* 图片上传 */
.pic-preview {
  display: inline-block; position: relative;
  border-radius: 10px; overflow: hidden; margin: 8px 8px 0 0;
}
.pic-preview img { width: 90px; height: 90px; object-fit: cover; display: block; }
.pic-preview .rx {
  position: absolute; top: 2px; right: 2px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: #fff;
  border: none; font-size: 14px; cursor: pointer;
}
.upload-box {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 90px; height: 90px;
  border: 2px dashed var(--border);
  border-radius: 10px; cursor: pointer;
  color: var(--text-mute); font-size: 12px;
  margin: 8px 8px 0 0;
}
.upload-box .uu { font-size: 24px; }
.hidden { display: none !important; }

/* 艾宾浩斯设置 */
.days-list { display: flex; gap: 8px; flex-wrap: wrap; }
.days-list .d {
  padding: 8px 14px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border);
  cursor: pointer; font-size: 13px;
}
.days-list .d.on {
  background: var(--primary-bg); border-color: var(--primary); color: var(--primary);
}

/* 组卷预览 */
.paper-preview {
  background: #fff; color: #222;
  padding: 20px; border-radius: 10px;
  font-size: 14px; line-height: 1.7;
  min-height: 200px;
}
.paper-preview h4 { margin: 16px 0 8px; }
.paper-preview .p-q { margin: 8px 0 14px; padding-bottom: 10px; border-bottom: 1px dashed #ddd; }
.paper-preview .p-a { color: #444; }

@media print {
  .top-bar, .bottom-tab, .filter-bar, .btn, .modal, .quick-btns, .card-title { display: none !important; }
  #mainView { padding: 0; max-width: 100%; }
  html[data-theme='dark'] body { background: white; }
}

@media (min-width: 640px) {
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
  .quick-btns { grid-template-columns: repeat(4, 1fr); }
}


</style>

  </head>

  <body>

    <div id="app">

      <!-- 顶部栏 -->

      <header class="top-bar">

        <div class="top-title">📘 错题本</div>

        <div class="top-actions">

          <button class="icon-btn" id="toggleTheme" title="深色模式">🌓</button>

          <button class="icon-btn" id="toggleFont" title="字体">A+</button>

        </div>

      </header>



      <!-- 主内容（单页多视口） -->

      <main id="mainView"></main>



      <!-- 底部导航 -->

      <nav class="bottom-tab" id="bottomTab">

        <div class="tab-item active" data-view="home">

          <div class="tab-icon">🏠</div><div class="tab-label">首页</div>

        </div>

        <div class="tab-item" data-view="input">

          <div class="tab-icon">✏️</div><div class="tab-label">录入</div>

        </div>

        <div class="tab-item" data-view="list">

          <div class="tab-icon">📋</div><div class="tab-label">题库</div>

        </div>

        <div class="tab-item" data-view="review">

          <div class="tab-icon">🔁</div><div class="tab-label">刷题</div>

        </div>

        <div class="tab-item" data-view="stats">

          <div class="tab-icon">📊</div><div class="tab-label">统计</div>

        </div>

      </nav>



      <!-- 模态层 -->

      <div class="modal-overlay" id="modalRoot" style="display:none;"></div>

      <!-- Toast -->

      <div id="toast" class="toast"></div>

    </div>

    { id: 6, subject: '数学', folder: '几何', tags: ['几何','三角形','勾股'], difficulty: 3,
      question: '直角三角形两直角边为 3 和 4，求斜边长。',
      wrongAnswer: '7',
      rightAnswer: '斜边 c = √(3²+4²) = √25 = 5',
      reason: '勾股定理不是简单相加',
      images: [], wrongCount: 1, mastered: false, favorite: false,
      createdAt: Date.now() - 1 * 86400000,
      nextReviewAt: Date.now() + 2 * 86400000 }
  ];

  function loadDB() {
    try {
      const s = localStorage.getItem(LS.DB);
      const parsed = s ? JSON.parse(s) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    localStorage.setItem(LS.DB, JSON.stringify(seedData));
    return seedData.slice();
  }
  function saveDB(arr) { localStorage.setItem(LS.DB, JSON.stringify(arr)); }

  // 全局状态
  const state = {
    db: loadDB(),
    settings: loadSettings()
  };

  // 主题应用
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.settings.theme);
    document.documentElement.setAttribute('data-font', state.settings.font);
  }

  // 错题 CRUD
  function addQ(q) {
    const id = (state.db[0]?.id || 0) + 1;
    const now = Date.now();
    const item = {
      id, subject: q.subject || '数学', folder: q.folder || '',
      tags: (q.tags || []).filter(Boolean),
      difficulty: q.difficulty || 2,
      question: q.question || '',
      wrongAnswer: q.wrongAnswer || '',
      rightAnswer: q.rightAnswer || '',
      reason: q.reason || '',
      images: q.images || [],
      wrongCount: 1,
      mastered: false, favorite: false,
      createdAt: now,
      nextReviewAt: now
    };
    state.db.unshift(item);
    saveDB(state.db);
    return item;
  }
  function updateQ(id, patch) {
    const i = state.db.findIndex(x => x.id === id);
    if (i >= 0) {
      state.db[i] = { ...state.db[i], ...patch };
      saveDB(state.db);
      return state.db[i];
    }
    return null;
  }
  function delQ(id) {
    state.db = state.db.filter(x => x.id !== id);
    saveDB(state.db);
  }
  function toggleFav(id) {
    const i = state.db.findIndex(x => x.id === id);
    if (i >= 0) { state.db[i].favorite = !state.db[i].favorite; saveDB(state.db); }
  }

  // 艾宾浩斯 —— 标记掌握 / 待复习
  function markMastered(id) {
    const i = state.db.findIndex(x => x.id === id);
    if (i < 0) return;
    const q = state.db[i];
    q.wrongCount += 1;
    if (q.wrongCount >= state.settings.masterThreshold) {
      q.mastered = true;
      q.nextReviewAt = null;
    } else {
      // 推进到下一周期
      const days = state.settings.ebbinghaus[Math.min(q.wrongCount - 1, state.settings.ebbinghaus.length - 1)];
      q.nextReviewAt = Date.now() + days * 86400000;
    }
    saveDB(state.db);
  }
  function markReviewLater(id) {
    const i = state.db.findIndex(x => x.id === id);
    if (i < 0) return;
    const q = state.db[i];
    q.mastered = false;
    q.wrongCount = Math.max(1, q.wrongCount);
    q.nextReviewAt = Date.now(); // 今天再复习一次
    saveDB(state.db);
  }

  // 今日复习清单（到了 nextReviewAt 的）
  function getTodayReview() {
    const now = Date.now();
    return state.db.filter(q => !q.mastered && q.nextReviewAt !== null && q.nextReviewAt <= now + 3600000);
  }

  // 统计
  function getStats() {
    const total = state.db.length;
    const mastered = state.db.filter(q => q.mastered).length;
    const toReview = getTodayReview().length;
    const favorites = state.db.filter(q => q.favorite).length;

    // 科目分布
    const subjectCount = {};
    state.db.forEach(q => { subjectCount[q.subject] = (subjectCount[q.subject] || 0) + 1; });

    // 易错知识点（tag 频次）
    const tagCount = {};
    state.db.forEach(q => {
      (q.tags || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
    });
    const topTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0, 8);

    // 近 30 天新增趋势（按周聚合）
    const weeks = [];
    for (let w = 3; w >= 0; w--) {
      const start = Date.now() - (w + 1) * 7 * 86400000;
      const end = Date.now() - w * 7 * 86400000;
      weeks.push(state.db.filter(q => q.createdAt >= start && q.createdAt < end).length);
    }

    return { total, mastered, toReview, favorites, subjectCount, topTags, weeks };
  }

  // 数据备份 / 导入
  function backupData() {
    const data = {
      db: state.db, settings: state.settings,
      exportedAt: new Date().toISOString(),
      version: 1
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `错题本_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  function importData(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => {
        try {
          const data = JSON.parse(fr.result);
          if (Array.isArray(data.db)) {
            state.db = data.db;
            saveDB(state.db);
            if (data.settings) { state.settings = { ...defaultSettings, ...data.settings }; saveSettings(state.settings); }
            applyTheme();
            resolve(true);
          } else reject(new Error('文件格式不正确'));
        } catch (e) { reject(e); }
      };
      fr.onerror = () => reject(new Error('读取失败'));
      fr.readAsText(file);
    });
  }
  function clearAll() {
    state.db = []; saveDB(state.db);
  }

  // PDF / 打印：返回 HTML 片段，供新窗口打印
  function buildPrintHTML(list, title) {
    const parts = [];
    parts.push('<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>' + (title || '错题本') + '</title>');
    parts.push('<style>body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#222;padding:24px;}h1{font-size:20px;margin-bottom:16px;border-bottom:2px solid #1976d2;padding-bottom:8px;}.q{border-left:3px solid #1976d2;padding:10px 14px;margin-bottom:14px;background:#fafafa;}.q .s{display:inline-block;background:#e3f2fd;color:#1976d2;padding:2px 10px;border-radius:10px;font-size:12px;margin-right:6px;}.q .t{font-weight:600;margin:6px 0;}.q .a{background:#fff;padding:10px;border-left:2px solid #43a047;margin-top:8px;}.q .w{background:#fff8e1;padding:8px;border-left:2px solid #f57c00;margin-top:4px;font-size:13px;}.q .r{background:#fff3e0;padding:8px;border-left:2px solid #e53935;margin-top:4px;font-size:13px;}</style></head><body>');
    parts.push('<h1>' + (title || '错题本全部错题') + ' — 共 ' + list.length + ' 题</h1>');
    list.forEach((q, i) => {
      parts.push('<div class="q">');
      parts.push('<span class="s">' + escapeHtml(q.subject) + '</span>');
      (q.tags || []).forEach(t => parts.push('<span class="s"># ' + escapeHtml(t) + '</span>'));
      parts.push('<div class="t">第 ' + (i+1) + ' 题 · ' + escapeHtml(q.question) + '</div>');
      if (q.wrongAnswer) parts.push('<div class="w">❌ 错误答案：' + escapeHtml(q.wrongAnswer) + '</div>');
      if (q.rightAnswer) parts.push('<div class="a">✅ 正确答案：' + escapeHtml(q.rightAnswer) + '</div>');
      if (q.reason) parts.push('<div class="r">💡 错误原因：' + escapeHtml(q.reason) + '</div>');
      parts.push('</div>');
    });
    parts.push('</body></html>');
    return parts.join('');
  }
  function exportPrint(list, title) {
    const html = buildPrintHTML(list, title);
    const w = window.open('', '_blank');
    if (!w) { toast('请允许弹出窗口'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
    setTimeout(() => w.print(), 300);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function loadTesseract() {
    if (window.Tesseract) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const sc = document.createElement('script');
      sc.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
      sc.onload = resolve; sc.onerror = reject;
      document.head.appendChild(sc);
    });
  }

  function recognizeImage(imageDataUrl, onProgress) {
    return loadTesseract().then(() => {
      return Tesseract.recognize(imageDataUrl, 'chi_sim+eng', {
        langPath: 'https://cdn.jsdelivr.net/gh/tesseract-js/tessdata_fast@4.0.0',
        gzip: true,
        logger: m => onProgress && onProgress({status: m.status, progress: m.progress})
      });
    }).then(({ data }) => {
      let text = data.text || '';
      text = text.replace(/\n{3,}/g, '\n\n').trim();
      return text;
    });
  }

  // Toast
  function toast(msg, ms = 1800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), ms);
  }

  // 暴露到全局
  window.Core = {
    state, addQ, updateQ, delQ, toggleFav,
    markMastered, markReviewLater, getTodayReview, getStats,
    backupData, importData, clearAll, exportPrint, buildPrintHTML,
    recognizeImage, loadTesseract, toast, applyTheme, saveSettings
  };
})();


</script>

    const s = getStats();
    const entries = Object.entries(s.subjectCount);
    const total = entries.reduce((a, [,v]) => a + v, 0) || 1;
    const colors = ['#1976d2','#43a047','#f57c00','#e53935','#8e24aa','#039be5','#6d4c41','#546e7a'];
    const cx = 80, cy = 80, r = 70;
    let cumulative = 0;
    let svg = '';
    if (entries.length === 0) {
      svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#e0e0e0"/>`;
    } else if (entries.length === 1) {
      svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${colors[0]}"/>`;
    } else {
      entries.forEach(([name, v], i) => {
        const start = (cumulative / total) * 2 * Math.PI - Math.PI/2;
        cumulative += v;
        const end = (cumulative / total) * 2 * Math.PI - Math.PI/2;
        const large = (end - start) > Math.PI ? 1 : 0;
        const x1 = cx + r * Math.cos(start);
        const y1 = cy + r * Math.sin(start);
        const x2 = cx + r * Math.cos(end);
        const y2 = cy + r * Math.sin(end);
        svg += `<path d="M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[i%colors.length]}" stroke="#fff" stroke-width="2" />`;
      });
    }
    container.innerHTML = svg;
  }

  // 页面切换入口
  function route(name, extra) {
    const main = document.getElementById('mainView');
    main.innerHTML = views[name] ? views[name]() : '';
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.view === name));

    else if (name === 'input') bindInput();
    else if (name === 'list') bindList();
    else if (name === 'review') bindReview();
    else if (name === 'stats') bindStats();
    window.Core._current = name;
  }

  function bindInput() {
    const Core = window.Core;
    let images = [];
    let tags = [];
    let difficulty = 2;
    let editingId = null;

    // 编辑模式
    const m = new URLSearchParams(location.hash.replace(/^#\??/, '')).get('edit');
    if (m) {
      const q = Core.state.db.find(x => x.id === +m);
      if (q) {
        editingId = q.id;
        document.getElementById('inpSubject').value = q.subject;
        document.getElementById('inpFolder').value = q.folder || '';
        document.getElementById('inpQuestion').value = q.question;
        document.getElementById('inpWrong').value = q.wrongAnswer;
        document.getElementById('inpRight').value = q.rightAnswer;
        document.getElementById('inpReason').value = q.reason;
        images = [...(q.images || [])];
        tags = [...(q.tags || [])];
        difficulty = q.difficulty;
        document.querySelectorAll('#inpStar span').forEach(s => s.classList.toggle('on', +s.dataset.n <= difficulty));
        renderPics(); renderTags();
        history.replaceState({}, '', location.pathname + location.search);
      }
    }

    function renderPics() {
      const box = document.getElementById('inpPics');
      box.innerHTML = images.map((u, i) => `
        <div class="pic-preview">
          <img src="${u}" alt="错题图">
          <button class="rx" data-i="${i}">×</button>
        </div>`).join('');
      box.querySelectorAll('.rx').forEach(b => b.onclick = () => { images.splice(+b.dataset.i, 1); renderPics(); });
    }
    function renderTags() {
      const box = document.getElementById('inpTagsBox');
      box.innerHTML = tags.map((t, i) => `<span class="chip del"># ${escapeHtml(t)}<span class="x" data-i="${i}">×</span></span>`).join('');
      box.querySelectorAll('.x').forEach(x => x.onclick = () => { tags.splice(+x.dataset.i, 1); renderTags(); });
    }

    // 难度星
    document.querySelectorAll('#inpStar span').forEach(s => {
      s.onclick = () => {
        difficulty = +s.dataset.n;
        document.querySelectorAll('#inpStar span').forEach(x => x.classList.toggle('on', +x.dataset.n <= difficulty));
      };
    });

    // 标签输入
    const tagInput = document.getElementById('inpTagInput');
    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = tagInput.value.trim().replace(/[，,]/g, '');
        if (v && !tags.includes(v)) tags.push(v);
        tagInput.value = '';
        renderTags();
      }
    });

    // 图片上传
    function readImage(file) {
      return new Promise(resolve => {
        const fr = new FileReader();
        fr.onload = e => resolve(e.target.result);
        fr.readAsDataURL(file);
      });
    }
    document.getElementById('inpPicBox').addEventListener('click', e => {
      const input = document.getElementById('inpPicInput');
      input.click();
    });
    document.getElementById('inpPicInput').onchange = async e => {
      for (const f of e.target.files) images.push(await readImage(f));
      renderPics(); e.target.value = '';
    };

    // 图片 + OCR 识别
    document.getElementById('inpAddImg').onclick = () => {
      const input = document.getElementById('inpFileAny');
      input.value = '';
      input.click();
    };
    document.getElementById('inpFileAny').onchange = async e => {
      const files = [...(e.target.files || [])];
      if (!files.length) return;
      const box = document.getElementById('inpOcrBox');
      const bar = document.getElementById('inpOcrBar');
      const status = document.getElementById('inpOcrStatus');
      box.style.display = 'inline-block';
      bar.style.width = '0%';
      status.textContent = '准备识别...';

      let merged = '';
      for (let i = 0; i < files.length; i++) {
        const url = await readImage(files[i]);
        images.push(url);
        status.textContent = `加载图片 ${i+1}/${files.length}...`;
        bar.style.width = Math.round(((i+0) / files.length) * 30) + '%';
        try {
          const text = await Core.recognizeImage(url, ({status:s, progress}) => {
            if (s && !s.startsWith('loading tesseract core') && !s.startsWith('initializing tesseract')) {
              status.textContent = `${i+1}/${files.length} · ${s}`;
            }
            bar.style.width = Math.round((i / files.length) * 100 + progress / files.length) + '%';
          });
          if (text) merged = merged ? merged + '\n' + text : text;
        } catch (err) {
          console.error(err);
          status.textContent = '识别失败（请联网，首次加载识别库）';
          await new Promise(r => setTimeout(r, 1500));
        }
      }
      const cur = document.getElementById('inpQuestion').value.trim();
      document.getElementById('inpQuestion').value = (cur ? cur + '\n' : '') + merged;
      bar.style.width = '100%';
      status.textContent = `✅ 共识别 ${files.length} 张`;
      renderPics();
      setTimeout(() => { box.style.display = 'none'; }, 2000);
      e.target.value = '';
    };

    // 保存
    document.getElementById('inpSave').onclick = () => {
      const q = {
        subject: document.getElementById('inpSubject').value,
        folder: document.getElementById('inpFolder').value.trim(),
        question: document.getElementById('inpQuestion').value.trim(),
        wrongAnswer: document.getElementById('inpWrong').value.trim(),
        rightAnswer: document.getElementById('inpRight').value.trim(),
        reason: document.getElementById('inpReason').value.trim(),
        tags, images, difficulty
      };
      if (!q.question || !q.wrongAnswer) { toast('题干和错误答案必填'); return; }
      let saved;
      if (editingId) { saved = Core.updateQ(editingId, q); }
      else { saved = Core.addQ(q); }
      const firstLine = (saved.question || '').slice(0, 30);
      openModal(editingId ? '✅ 更新成功' : '🎉 保存成功', `
        <div style="text-align:center;padding:10px 16px;">
          <div style="font-size:48px;margin-bottom:8px;">${editingId ? '✏️' : '🎯'}</div>
          <div style="font-weight:600;font-size:16px;margin-bottom:8px;">${editingId ? '错题已更新到题库' : '错题已加入题库'}</div>
          <div style="font-size:13px;color:#888;background:#f5f5f5;padding:10px;border-radius:8px;margin-bottom:14px;line-height:1.5;">
            <b>${escapeHtml(saved.subject)}</b> · 难度 ${'★'.repeat(saved.difficulty)}${'☆'.repeat(5-saved.difficulty)}<br>
            ${escapeHtml(firstLine)}${saved.question.length > 30 ? '...' : ''}
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-ghost" id="saveOk">留在录入</button>
            <button class="btn btn-primary" id="saveGo">去刷题</button>
            <button class="btn btn-primary" id="saveList">题库</button>
          </div>
        </div>
      `);
      document.getElementById('saveOk').onclick = () => { closeModal(); resetAll(); };
      document.getElementById('saveGo').onclick = () => { closeModal(); resetAll(); route('review'); };
      document.getElementById('saveList').onclick = () => { closeModal(); resetAll(); route('list'); };
    };

    document.getElementById('inpReset').onclick = () => { resetAll(); };
    function resetAll() {
      images = []; tags = []; difficulty = 2; editingId = null;
      document.getElementById('inpQuestion').value = '';
      document.getElementById('inpWrong').value = '';
      document.getElementById('inpRight').value = '';
      document.getElementById('inpReason').value = '';
      document.getElementById('inpFolder').value = '';
      document.getElementById('inpSubject').selectedIndex = 0;
      document.querySelectorAll('#inpStar span').forEach((s, i) => s.classList.toggle('on', i < 2));
      renderPics(); renderTags();
    }
  }

  function bindList() {
    const { state } = window.Core;
    const subjectFilter = document.getElementById('fSubject');
    const diffFilter = document.getElementById('fDifficulty');
    const statusFilter = document.getElementById('fStatus');
    const search = document.getElementById('fSearch');
    const body = document.getElementById('listBody');

    function render() {
      let list = [...state.db];
      if (subjectFilter.value) list = list.filter(q => q.subject === subjectFilter.value);
      if (diffFilter.value) list = list.filter(q => q.difficulty === +diffFilter.value);
      if (statusFilter.value === 'fav') list = list.filter(q => q.favorite);
      if (statusFilter.value === 'todo') list = list.filter(q => !q.mastered);
      if (statusFilter.value === 'done') list = list.filter(q => q.mastered);
      if (search.value.trim()) {
        const k = search.value.trim();
        list = list.filter(q =>
          q.question.includes(k) || (q.tags||[]).some(t => t.includes(k)) || q.reason.includes(k)
        );
      }
      if (list.length === 0) { body.innerHTML = '<div class="empty"><div class="ee">📭</div>没有匹配到错题</div>'; return; }
      body.innerHTML = list.map(q => `
        <div class="q-item ${q.favorite?'fav':''} ${q.mastered?'mastered':''}">
          <div class="q-top">
            <span class="q-subject">${escapeHtml(q.subject)}</span>
            <div style="display:flex;gap:6px;align-items:center;">
              <span style="font-size:12px;color:#888;">${'★'.repeat(q.difficulty)}${'☆'.repeat(5-q.difficulty)}</span>
              ${q.favorite ? '<span style="color:#ffb300;">★</span>' : ''}
            </div>
          </div>
          <div class="q-body">${escapeHtml(q.question)}</div>
          <div class="q-meta">
            <span>错 ${q.wrongCount} 次</span>
            ${q.folder ? `<span>📂 ${escapeHtml(q.folder)}</span>` : ''}
            ${(q.tags||[]).slice(0,3).map(t=>`<span>#${escapeHtml(t)}</span>`).join('')}
            ${q.mastered ? '<span style="color:#43a047;">✓ 已掌握</span>' : ''}
          </div>
          <div class="q-actions">
            <button class="btn btn-ghost btn-sm" data-act="fav" data-id="${q.id}">${q.favorite?'★':'☆'}</button>
            <button class="btn btn-primary btn-sm" data-act="show" data-id="${q.id}">详情</button>
          </div>
        </div>
      `).join('');
      body.querySelectorAll('.q-item').forEach(el => el.onclick = (e) => {
        if (e.target.closest('.btn')) return;
        const qq = state.db.find(x => x.id === +el.querySelector('[data-act="show"]')?.dataset.id);
        if (qq) showDetail(qq);
      });
      body.querySelectorAll('[data-act="fav"]').forEach(b => b.onclick = () => { Core.toggleFav(+b.dataset.id); render(); });
    }

    subjectFilter.onchange = diffFilter.onchange = statusFilter.onchange = render;
    search.oninput = render;
    render();
  }

  let rvIdx = 0;
  let rvList = [];
  let rvShowAnswer = false;
  function bindReview() {
    const { state, markMastered, markReviewLater, toast } = window.Core;
    const subjectFilter = document.getElementById('rvSubject');
    const scopeFilter = document.getElementById('rvScope');
    const orderFilter = document.getElementById('rvOrder');

    function buildList() {
      let list = [...state.db];
      if (subjectFilter.value && subjectFilter.value !== '全部科目') {
        list = list.filter(q => q.subject === subjectFilter.value);
      }
      if (scopeFilter.value === 'todo') {
        list = list.filter(q => !q.mastered);
      } else if (scopeFilter.value === 'fav') {
        list = list.filter(q => q.favorite);
      }
      if (orderFilter.value === 'random') {
        list = list.sort(() => Math.random() - 0.5);
      } else {
        list = list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }
      rvList = list;
      rvIdx = 0;
      rvShowAnswer = false;
    }

    function render() {
      const card = document.getElementById('rvCard');
      if (!card) return;

      if (rvList.length === 0) {
        card.innerHTML = '<div class="empty"><div class="ee">📭</div>此筛选下没有可刷的错题<br><small style="color:#888;">试试切换科目或改选"包含已掌握"</small></div>';
        const showBtn = document.getElementById('rvShow');
        const masterBtn = document.getElementById('rvMaster');
        const againBtn = document.getElementById('rvAgain');
        if (showBtn) showBtn.disabled = true;
        if (masterBtn) masterBtn.disabled = true;
        if (againBtn) againBtn.disabled = true;
        return;
      }

      const q = rvList[rvIdx];
      rvShowAnswer = false;

      const showBtn = document.getElementById('rvShow');
      const masterBtn = document.getElementById('rvMaster');
      const againBtn = document.getElementById('rvAgain');
      if (showBtn) showBtn.disabled = false;
      if (masterBtn) masterBtn.disabled = false;
      if (againBtn) againBtn.disabled = false;

      card.innerHTML = `
        <div class="review-tag s">${escapeHtml(q.subject)}</div>
        <div class="review-tag d">难度 ${'★'.repeat(q.difficulty)}${'☆'.repeat(5-q.difficulty)}</div>
        ${q.folder ? `<div class="review-tag s">📂 ${escapeHtml(q.folder)}</div>` : ''}
        ${q.favorite ? '<span class="review-tag d" style="background:#fff8e1;color:#ff9800;">★ 收藏</span>' : ''}
        ${q.mastered ? '<span class="review-tag s" style="background:#e8f5e9;color:#2e7d32;">✓ 已掌握</span>' : ''}
        <div class="review-q">${escapeHtml(q.question)}</div>
        ${q.images && q.images.length ? q.images.map(u => `<img class="review-pic" src="${u}">`).join('') : ''}
        <div id="rvAnswerBox"></div>
        <div style="margin-top:14px;font-size:13px;color:#888;text-align:center;">
          第 ${rvIdx + 1} / ${rvList.length} 题 · 已错 ${q.wrongCount} 次
        </div>
      `;
    }

    function renderAnswerBox() {
      const box = document.getElementById('rvAnswerBox');
      if (!box) return;
      const q = rvList[rvIdx];
      if (!rvShowAnswer || !q) { box.innerHTML = ''; return; }
      let html = '';
      if (q.wrongAnswer) html += `<div class="review-wrong">❌ 错误答案：${escapeHtml(q.wrongAnswer)}</div>`;
      if (q.rightAnswer) html += `<div class="review-answer-wrap"><div class="review-answer">✅ 正确答案：${escapeHtml(q.rightAnswer)}</div></div>`;
      if (q.reason) html += `<div class="review-reason">💡 原因：${escapeHtml(q.reason)}</div>`;
      if ((q.tags || []).length) html += `<div style="margin-top:10px;font-size:12px;color:#888;">知识点：${q.tags.map(t => '<span class="tag" style="margin-right:4px;">#' + escapeHtml(t) + '</span>').join('')}</div>`;
      box.innerHTML = html;
    }

    subjectFilter.onchange = scopeFilter.onchange = orderFilter.onchange = () => { buildList(); render(); };

    document.getElementById('rvReset').onclick = () => { buildList(); render(); window.Core.toast('已重置刷题顺序'); };
    document.getElementById('rvPrev').onclick = () => { if (rvList.length === 0) return; if (rvIdx > 0) rvIdx--; else rvIdx = rvList.length - 1; render(); };
    document.getElementById('rvNext').onclick = () => { if (rvList.length === 0) return; if (rvIdx < rvList.length - 1) rvIdx++; else { window.Core.toast('已是最后一题，已回到第1题'); rvIdx = 0; } render(); };
    document.getElementById('rvShow').onclick = () => {
      rvShowAnswer = !rvShowAnswer;
      renderAnswerBox();
      if (!rvShowAnswer) {
        const btn = document.getElementById('rvShow');
        if (btn) btn.textContent = '👁 显示/隐藏答案（显示中）';
      } else {
        const btn = document.getElementById('rvShow');
        if (btn) btn.textContent = '👁 显示/隐藏答案（隐藏中）';
      }
    };

    document.getElementById('rvMaster').onclick = () => {
      if (rvList.length === 0) return;
      markMastered(rvList[rvIdx].id);
      window.Core.toast('✅ 已掌握，推进到下一周期');
      rvList.splice(rvIdx, 1);
      if (rvList.length === 0) { render(); return; }
      if (rvIdx >= rvList.length) rvIdx = rvList.length - 1;
      render();
    };

    document.getElementById('rvAgain').onclick = () => {
      if (rvList.length === 0) return;
      markReviewLater(rvList[rvIdx].id);
      window.Core.toast('🔁 再练一次');
      if (rvIdx < rvList.length - 1) rvIdx++; else { rvIdx = 0; }
      render();
    };

    buildList();
    render();
    renderAnswerBox();
  }

  function bindStats() {
    setTimeout(() => {
      const svg = document.getElementById('pieSvg');
      if (svg) drawPie(svg, document.getElementById('pieLegend'));
    }, 10);

    document.getElementById('bkExport').onclick = () => window.Core.backupData();
    const importInput = document.getElementById('bkImport');
    importInput.onchange = async e => {
      if (!e.target.files[0]) return;
      try {
        await window.Core.importData(e.target.files[0]);
        window.Core.toast('导入成功');
      } catch (err) { window.Core.toast('导入失败：' + err.message); }
      e.target.value = '';
    };
    document.getElementById('bkPaper').onclick = showPaperMaker;
    document.getElementById('bkPrintAll').onclick = () => window.Core.exportPrint(window.Core.state.db, '全部错题');
    document.getElementById('bkClear').onclick = () => {
      if (confirm('确定清空全部错题？不可恢复！')) {
        window.Core.clearAll();
        window.Core.toast('已清空'); route('home');
      }
    };

    document.querySelectorAll('#ebbinghausList .d').forEach(el => {
      el.onclick = () => {
        el.classList.toggle('on');
        const days = [...document.querySelectorAll('#ebbinghausList .d.on')].map(n => +n.dataset.d).sort((a,b)=>a-b);
        window.Core.state.settings.ebbinghaus = days.length ? days : [1,2,4,7,15,30];
      };
    });

    document.getElementById('saveSettings').onclick = () => {
      const t = document.getElementById('thresholdInput').value;
      window.Core.state.settings.masterThreshold = Math.max(1, Math.min(10, +t || 3));
      window.Core.saveSettings(window.Core.state.settings);
      window.Core.toast('设置已保存');
      route('stats');
    };
  }

  // 顶部按钮
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('toggleTheme').onclick = () => {
      const next = window.Core.state.settings.theme === 'dark' ? 'light' : 'dark';
      window.Core.state.settings.theme = next;
      window.Core.saveSettings(window.Core.state.settings);
      window.Core.applyTheme();
      route(window.Core._current || 'home');
    };
    document.getElementById('toggleFont').onclick = () => {
      const next = window.Core.state.settings.font === 'large' ? 'normal' : 'large';
      window.Core.state.settings.font = next;
      window.Core.saveSettings(window.Core.state.settings);
      window.Core.applyTheme();
    };
    document.querySelectorAll('.tab-item').forEach(t => {
      t.onclick = () => route(t.dataset.view);
    });
    window.Core.applyTheme();
    route('home');
  });

  // 暴露
  window.route = route;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window._route = route;
})();


</script>

  </body>

</html>
