<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2578e6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="一款高效的错题管理工具，支持艾宾浩斯复习、OCR识别、组卷等功能">
  <title>错题本</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192x192.png">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
    body {background:#f5f7fa;color:#333;padding-bottom:70px;transition:all 0.3s;}
    body.dark-mode {background:#1a1a2e;color:#e0e0e0;}
    header {background:#2578e6;color:#fff;padding:14px 20px;font-size:18px;font-weight:bold;position:sticky;top:0;z-index:99;}
    body.dark-mode header {background:#16213e;}
    .nav-bar {position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #eee;}
    body.dark-mode .nav-bar {background:#16213e;border-top:1px solid #333;}
    .nav-item {flex:1;text-align:center;padding:10px 0;color:#666;font-size:14px;}
    body.dark-mode .nav-item {color:#999;}
    .nav-item.active {color:#2578e6;}
    .page {display:none;padding:16px;}
    .page.active {display:block;}
    .card {background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px #00000010;}
    body.dark-mode .card {background:#16213e;box-shadow:0 2px 8px #00000030;}
    .card-title {font-size:16px;font-weight:bold;margin-bottom:10px;}
    input,textarea,select {width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;margin:8px 0;font-size:14px;background:#fff;color:#333;}
    body.dark-mode input,body.dark-mode textarea,body.dark-mode select {background:#2d3436;border-color:#444;color:#e0e0e0;}
    textarea {min-height:80px;resize:vertical;}
    .btn {padding:10px 16px;border:none;border-radius:6px;color:#fff;background:#2578e6;margin:6px 0;cursor:pointer;width:100%;font-size:15px;}
    .btn-gray {background:#999;}
    body.dark-mode .btn-gray {background:#444;}
    .btn-danger {background:#f53f3f;}
    .tag {display:inline-block;padding:4px 8px;background:#e8f0fe;color:#2578e6;border-radius:4px;margin:3px;font-size:12px;}
    body.dark-mode .tag {background:#2d3436;color:#81ecec;}
    .star-box span {color:#ccc;font-size:22px;cursor:pointer;}
    .star-box span.active {color:#ffb800;}
    .stat-row {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
    .stat-card {text-align:center;padding:12px;background:#e8f0fe;border-radius:8px;}
    body.dark-mode .stat-card {background:#2d3436;}
    .stat-num {font-size:24px;font-weight:bold;color:#2578e6;}
    body.dark-mode .stat-num {color:#81ecec;}
    .filter-row {display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
    .filter-btn {padding:6px 10px;border:1px solid #2578e6;color:#2578e6;border-radius:4px;background:#fff;}
    body.dark-mode .filter-btn {background:#2d3436;border-color:#81ecec;color:#81ecec;}
    .filter-btn.active {background:#2578e6;color:#fff;}
    body.dark-mode .filter-btn.active {background:#81ecec;color:#1a1a2e;}
    .img-preview {max-width:100%;max-height:200px;margin:8px 0;border-radius:6px;}
    #chart-box {width:100%;height:300px;margin:15px 0;}
    .font-size-btn {padding:8px 12px;border:1px solid #2578e6;border-radius:4px;margin:4px;cursor:pointer;}
    body.dark-mode .font-size-btn {border-color:#81ecec;color:#81ecec;}
    .font-size-btn.active {background:#2578e6;color:#fff;}
    body.dark-mode .font-size-btn.active {background:#81ecec;color:#1a1a2e;}
  </style>
</head>
<body>
<header>📖 我的错题本</header>

<!-- 页面容器 -->
<div id="page-home" class="page active">
  <div class="card" id="userInfoCard" style="display:none;">
    <div style="display:flex;align-items:center;">
      <img id="userAvatar" src="" alt="头像" style="width:60px;height:60px;border-radius:50%;margin-right:15px;">
      <div>
        <div style="font-weight:bold;font-size:16px;" id="userName">用户</div>
        <div style="font-size:12px;color:#999;" id="loginType">未登录</div>
      </div>
      <button class="btn btn-gray" style="margin-left:auto;width:auto;padding:6px 12px;font-size:12px;" onclick="switchPage('page-user')">设置</button>
    </div>
  </div>
  <div class="card" id="loginCard" style="display:block;">
    <div class="card-title">👤 用户登录</div>
    <input id="loginPhone" placeholder="请输入手机号">
    <button class="btn" onclick="phoneLogin()">📱 手机号登录</button>
    <button class="btn" style="background:#07C160;" onclick="wechatLogin()">💚 微信登录</button>
    <button class="btn" style="background:#12B7F5;" onclick="qqLogin()">💙 QQ登录</button>
  </div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num" id="totalErr">0</div><div>全部错题</div></div>
    <div class="stat-card"><div class="stat-num" id="reviewErr">0</div><div>待复习</div></div>
    <div class="stat-card"><div class="stat-num" id="masterErr">0</div><div>已掌握</div></div>
    <div class="stat-card"><div class="stat-num" id="todayReview">0</div><div>今日复习</div></div>
  </div>
  <div class="card" id="todayReviewCard">
    <div class="card-title">📅 今日复习清单</div>
    <div id="todayReviewList"></div>
  </div>
  <div class="card">
    <div class="card-title">快捷操作</div>
    <button class="btn" onclick="switchPage('page-add')">➕ 新增错题</button>
    <button class="btn" onclick="startTodayReview()">📝 开始今日复习</button>
    <button class="btn" onclick="switchPage('page-list')">📚 查看全部错题</button>
    <button class="btn" onclick="switchPage('page-stat')">📊 数据统计 & 导出</button>
  </div>
</div>

<!-- 用户设置页面 -->
<div id="page-user" class="page">
  <div class="card">
    <div class="card-title">👤 个人信息</div>
    <div style="text-align:center;margin-bottom:15px;">
      <img id="avatarPreview" src="" alt="头像" style="width:100px;height:100px;border-radius:50%;margin-bottom:10px;">
      <div style="font-weight:bold;" id="userNameDisplay">用户</div>
      <div style="font-size:12px;color:#999;" id="userPhoneDisplay"></div>
    </div>
    <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
    <button class="btn" onclick="document.getElementById('avatarUpload').click()">📷 更换头像</button>
    <input id="nicknameInput" placeholder="修改昵称">
    <button class="btn" onclick="updateNickname()">✏️ 修改昵称</button>
  </div>
  <div class="card">
    <div class="card-title">🔐 账号安全</div>
    <button class="btn btn-danger" onclick="logout()">🚪 退出登录</button>
  </div>
  <div class="card">
    <button class="btn btn-gray" onclick="switchPage('page-home')">← 返回首页</button>
  </div>
</div>

<div id="page-add" class="page">
  <div class="card">
    <div class="card-title">录入新错题</div>
    <select id="subSel">
      <option value="语文">语文</option>
      <option value="数学">数学</option>
      <option value="英语">英语</option>
      <option value="物理">物理</option>
      <option value="化学">化学</option>
      <option value="生物">生物</option>
      <option value="历史">历史</option>
      <option value="地理">地理</option>
      <option value="政治">政治</option>
      <option value="其他">其他</option>
    </select>
    <input id="knowInput" placeholder="知识点，多个用逗号分隔（如：二次函数,图像）">
    <div class="star-box" id="starBox">
      <span onclick="setStar(1)">★</span>
      <span onclick="setStar(2)">★</span>
      <span onclick="setStar(3)">★</span>
      <span onclick="setStar(4)">★</span>
      <span onclick="setStar(5)">★</span>
    </div>
    <textarea id="titleInput" placeholder="题干内容"></textarea>
    <textarea id="errInput" placeholder="自己错误答案"></textarea>
    <textarea id="rightInput" placeholder="标准答案"></textarea>
    <textarea id="reasonInput" placeholder="错误原因：计算失误/知识点遗忘/审题不清等"></textarea>
    <input type="file" id="imgUpload" accept="image/*" multiple>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
    <button class="btn" onclick="takePhoto()">📸 拍照识别</button>
    <div id="imgShow"></div>
    <button class="btn" onclick="ocrImage()">📷 OCR识别图片文字</button>
    <button class="btn" onclick="saveError()">保存错题</button>
    <button class="btn btn-gray" onclick="clearAddForm()">清空表单</button>
  </div>
</div>

<div id="page-list" class="page">
  <div class="filter-row">
    <input id="searchInput" placeholder="搜索题干/知识点" oninput="renderErrList()">
  </div>
  <div id="errListBox"></div>
</div>

<div id="page-review" class="page">
  <div id="reviewBox" class="card"></div>
  <div id="reviewBtnGroup"></div>
</div>

<div id="page-stat" class="page">
  <div class="card">
    <div class="card-title">错题科目分布</div>
    <div id="chart-box"></div>
  </div>
  <div class="card">
    <div class="card-title">云端同步</div>
    <div id="syncStatus">🔄 未登录</div>
    <input id="cloudEmail" placeholder="输入邮箱账号（模拟登录）">
    <button class="btn" onclick="cloudLogin()">📱 登录云端</button>
    <button class="btn" onclick="cloudSync()">☁️ 同步到云端</button>
    <button class="btn btn-gray" onclick="cloudRestore()">📥 从云端恢复</button>
    <button class="btn btn-danger" onclick="cloudLogout()">🚪 退出登录</button>
  </div>
  <div class="card">
    <div class="card-title">主题设置</div>
    <button class="btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙 切换到深色模式</button>
    <div style="margin-top:10px;">
      <div style="margin-bottom:8px;">字体大小：</div>
      <div class="filter-row" id="fontSizeBtns">
        <button class="font-size-btn" onclick="setFontSize(14)">小</button>
        <button class="font-size-btn" onclick="setFontSize(16)">中</button>
        <button class="font-size-btn" onclick="setFontSize(18)">大</button>
        <button class="font-size-btn" onclick="setFontSize(20)">超大</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">数据操作</div>
    <button class="btn" onclick="exportPdf()">导出全部错题PDF</button>
    <button class="btn" onclick="backupData()">备份数据JSON</button>
    <input type="file" id="importFile" accept=".json" onchange="importData(this)">
    <button class="btn btn-danger" onclick="clearAllData()">清空全部错题</button>
  </div>
</div>

<!-- 文件夹管理页面 -->
<div id="page-folder" class="page">
  <div class="card">
    <div class="card-title">📁 我的文件夹</div>
    <div id="folderList"></div>
    <button class="btn" onclick="showAddFolderModal()">+ 添加文件夹</button>
  </div>
  <div class="card">
    <div class="card-title">🏷️ 标签组管理</div>
    <div id="tagGroupList"></div>
    <button class="btn" onclick="showAddTagGroupModal()">+ 添加标签组</button>
  </div>
</div>

<!-- 组卷页面 -->
<div id="page-exam" class="page">
  <div class="card">
    <div class="card-title">📝 错题组卷</div>
    <div class="filter-row">
      <select id="examSubject" onchange="renderExamErrList()">
        <option value="all">全部科目</option>

      </select>

        <option value="all">全部难度</option>
        <option value="1">★</option>

        <option value="3">★★★</option>

</div>

<!-- 试卷预览弹窗 -->
<div id="examPreviewModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);overflow-y:auto;padding:20px;">
  <div class="card" style="max-width:800px;margin:20px auto;">

    <input id="examTitle" placeholder="请输入试卷标题" value="专项练习试卷">
    <input id="examSubtitle" placeholder="副标题（如：第1章 函数）">
    <div id="examContent"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn" onclick="exportExamPdf()">导出PDF</button>
      <button class="btn btn-gray" onclick="closeExamModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 添加文件夹弹窗 -->
<div id="folderModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="width:100%;max-width:400px;">
    <div class="card-title">添加文件夹</div>
    <input id="folderNameInput" placeholder="文件夹名称">
    <input id="folderIconInput" placeholder="图标（如：📁）">
    <button class="btn" onclick="addFolder()">确定</button>
    <button class="btn btn-gray" onclick="closeFolderModal()">取消</button>
  </div>
</div>

<!-- 添加标签组弹窗 -->
<div id="tagGroupModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="width:100%;max-width:400px;">
    <div class="card-title">添加标签组</div>
    <input id="tagGroupNameInput" placeholder="标签组名称">
    <input id="tagItemsInput" placeholder="标签项，用逗号分隔">
    <button class="btn" onclick="addTagGroup()">确定</button>
    <button class="btn btn-gray" onclick="closeTagGroupModal()">取消</button>
  </div>
</div>

<!-- 底部导航 -->
<div class="nav-bar">
  <div class="nav-item active" onclick="switchPage('page-home')">首页</div>
  <div class="nav-item" onclick="switchPage('page-add')">录入</div>
  <div class="nav-item" onclick="switchPage('page-list')">错题库</div>
  <div class="nav-item" onclick="switchPage('page-exam')">组卷</div>
  <div class="nav-item" onclick="switchPage('page-stat')">统计</div>
</div>

<script>
// 全局数据
let data = JSON.parse(localStorage.getItem("errorBook")) || {
  subjectList:["语文","数学","英语","物理","化学","生物","历史","地理","政治"],
  errorList:[],
  folders:[
    {id:"folder_all",name:"全部错题",icon:"📚",default:true},
    {id:"folder_review",name:"待复习",icon:"🔁",default:true},
    {id:"folder_master",name:"已掌握",icon:"✅",default:true}
  ],
  tagGroups:[
    {id:"tag_1",name:"难度等级",tags:["⭐简单","⭐⭐较难","⭐⭐⭐困难","⭐⭐⭐⭐挑战"]},
    {id:"tag_2",name:"错误类型",tags:["计算失误","知识点遗忘","审题不清","概念混淆","粗心大意"]}
  ],
  setting:{reviewCycle:[1,3,7,14,30],autoRemind:true,darkMode:false,fontSize:16},
  user:{
    loggedIn:false,
    userId:"",
    username:"用户",
    phone:"",
    avatar:"",
    loginType:""
  }
};

// 应用主题设置
function applyTheme() {
  if (data.setting.darkMode) {
    document.body.classList.add('dark-mode');
  } else {
    document.body.classList.remove('dark-mode');
  }
  document.body.style.fontSize = data.setting.fontSize + 'px';
  updateThemeUI();
}

// 更新主题UI
function updateThemeUI() {
  const darkModeBtn = document.getElementById('darkModeBtn');
  if (darkModeBtn) {
    darkModeBtn.innerHTML = data.setting.darkMode ? '☀️ 切换到浅色模式' : '🌙 切换到深色模式';
  }
  
  const fontSizeBtns = document.querySelectorAll('.font-size-btn');
  fontSizeBtns.forEach(btn => {
    btn.classList.remove('active');
  });
  
  const currentSizeBtn = document.querySelector(`.font-size-btn:nth-child(${[14,16,18,20].indexOf(data.setting.fontSize) + 1})`);
  if (currentSizeBtn) {
    currentSizeBtn.classList.add('active');
  }
}

// 切换深色模式
function toggleDarkMode() {
  data.setting.darkMode = !data.setting.darkMode;
  saveLocal();
  applyTheme();
}

// 设置字体大小
function setFontSize(size) {
  data.setting.fontSize = size;
  saveLocal();
  applyTheme();
}

// ========== 云端同步功能（模拟）==========
const CLOUD_STORAGE_KEY = 'errorbook_cloud_';

function getCloudKey(email) {
  return CLOUD_STORAGE_KEY + email.toLowerCase().replace(/[^a-zA-Z0-9]/g, '_');
}

function cloudLogin() {
  const email = document.getElementById('cloudEmail').value.trim();
  if (!email || !email.includes('@')) {
    alert('请输入有效的邮箱地址');
    return;
  }
  
  data.setting.cloudUser = email;
  saveLocal();
  updateSyncStatus();
  alert('登录成功！\n\n（注：此为模拟云端，数据实际存储在本地浏览器）');
}

function cloudLogout() {
  if (!confirm('确定退出登录？')) return;
  data.setting.cloudUser = null;
  saveLocal();
  document.getElementById('cloudEmail').value = '';
  updateSyncStatus();
  alert('已退出登录');
}

function cloudSync() {
  if (!data.setting.cloudUser) {
    alert('请先登录');
    return;
  }
  
  const cloudKey = getCloudKey(data.setting.cloudUser);
  const cloudData = {
    data: data,
    syncTime: new Date().toISOString(),
    version: '1.0'
  };
  
  localStorage.setItem(cloudKey, JSON.stringify(cloudData));
  data.setting.lastSync = new Date().toISOString();
  saveLocal();
  updateSyncStatus();
  alert('同步成功！');
}

function cloudRestore() {
  if (!data.setting.cloudUser) {
    alert('请先登录');
    return;
  }
  
  const cloudKey = getCloudKey(data.setting.cloudUser);
  const cloudDataStr = localStorage.getItem(cloudKey);
  
  if (!cloudDataStr) {
    alert('云端暂无数据');
    return;
  }
  
  if (!confirm('确定从云端恢复数据？本地数据将被覆盖！')) return;
  
  const cloudData = JSON.parse(cloudDataStr);
  data = cloudData.data;
  saveLocal();
  data.setting.lastSync = new Date().toISOString();
  
  alert('恢复成功！页面将刷新...');
  window.location.reload();
}

function updateSyncStatus() {
  const status = document.getElementById('syncStatus');
  if (!status) return;
  
  if (data.setting.cloudUser) {
    const lastSync = data.setting.lastSync ? 
      '最后同步：' + new Date(data.setting.lastSync).toLocaleString() : 
      '从未同步';
    status.innerHTML = `✅ 已登录: ${data.setting.cloudUser}<br><small>${lastSync}</small>`;
  } else {
    status.innerHTML = '🔄 未登录';
  }
}

// 艾宾浩斯复习间隔（天数）
const EBBINGHAUS_INTERVALS = [1, 3, 7, 14, 30];

// 计算下次复习日期
function calculateNextReview(reviewCount) {
  const today = new Date();
  const interval = EBBINGHAUS_INTERVALS[Math.min(reviewCount, EBBINGHAUS_INTERVALS.length - 1)];
  today.setDate(today.getDate() + interval);
  return today.toISOString().split("T")[0];
}

// 获取今日复习清单
function getTodayReviewList() {
  const today = new Date().toISOString().split("T")[0];
  return data.errorList.filter(e => !e.master && e.nextReview && e.nextReview <= today);
}
let selectStar = 3;
let tempImg = [];
let reviewIndex = 0;
let reviewPool = [];

// 页面切换
function switchPage(pageId){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
  document.querySelectorAll(".nav-item").forEach((nav,i)=>{
    nav.classList.remove("active");
  });
  event.target.classList.add("active");
  if(pageId==="page-home") renderHomeStat();
  if(pageId==="page-list") renderErrList();
  if(pageId==="page-stat") renderChart();
  if(pageId==="page-review") initReview();
  if(pageId==="page-folder") {

  let target = data.errorList.find(e => e.id === id);
  if (target) {
    target.reviewCount = (target.reviewCount || 0) + 1;
    target.lastReview = new Date().toISOString().split("T")[0];

  }

  renderReviewItem();
}

// 尝试使用浏览器内置的OCR API（部分浏览器支持）
async function tryBrowserOCR(imageData) {
  try {
    if ('ImageCapture' in window && 'TextDetector' in window) {
      const textDetector = new TextDetector();
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const img = new Image();
      img.src = imageData;
      await new Promise((resolve) => { img.onload = resolve; });
      
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      const results = await textDetector.detect(canvas);
      return results.map(r => r.rawValue).join('\n');
    }
  } catch (e) {
    console.log('Browser OCR not available:', e);
  }
  return null;
}

function getFolderCount(folderId) {
  switch(folderId) {
    case "folder_all": return data.errorList.length;
    case "folder_review": return data.errorList.filter(e => !e.master).length;
    case "folder_master": return data.errorList.filter(e => e.master).length;
    default: 
      const folder = data.folders.find(f => f.id === folderId);
      return folder && folder.errorIds ? folder.errorIds.length : 0;
  }
}

  alert('正在跳转到QQ授权...\n\n（演示环境，已自动完成登录）');
  
  data.user = {
    loggedIn: true,
    userId: 'qq_' + Date.now(),
    username: 'QQ用户',
    phone: '',
    avatar: '',
    loginType: 'qq'
  };
  saveLocal();
  updateUserUI();
}

function logout() {
  if (!confirm('确定退出登录？')) return;
  
  data.user = {
    loggedIn: false,
    userId: '',
    username: '用户',
    phone: '',
    avatar: '',
    loginType: ''
  };
  saveLocal();
  updateUserUI();
  alert('已退出登录');
}

function updateNickname() {
  const nickname = document.getElementById('nicknameInput').value.trim();
  if (!nickname) {
    alert('请输入昵称');
    return;
  }
  data.user.username = nickname;
  saveLocal();
  updateUserUI();
  alert('昵称修改成功');
}

// 头像上传处理
document.getElementById('avatarUpload').addEventListener('change', function(e) {
  const files = e.target.files;
  if (files.length > 0) {
    const file = files[0];
    const reader = new FileReader();
    reader.onload = function(ev) {
      data.user.avatar = ev.target.result;
      saveLocal();
      updateUserUI();
      alert('头像更新成功');
    };
    reader.readAsDataURL(file);
  }
});

function updateUserUI() {
  const userInfoCard = document.getElementById('userInfoCard');
  const loginCard = document.getElementById('loginCard');
  const userAvatar = document.getElementById('userAvatar');
  const userName = document.getElementById('userName');
  const loginType = document.getElementById('loginType');
  const avatarPreview = document.getElementById('avatarPreview');
  const userNameDisplay = document.getElementById('userNameDisplay');
  const userPhoneDisplay = document.getElementById('userPhoneDisplay');
  
  if (data.user.loggedIn) {
    userInfoCard.style.display = 'block';
    loginCard.style.display = 'none';
    
    if (userAvatar) {
      userAvatar.src = data.user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + data.user.userId;
    }
    if (userName) {
      userName.textContent = data.user.username;
    }
    if (loginType) {
      const typeNames = {phone: '手机号登录', wechat: '微信登录', qq: 'QQ登录'};
      loginType.textContent = typeNames[data.user.loginType] || '已登录';
    }
    
    if (avatarPreview) {
      avatarPreview.src = data.user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + data.user.userId;
    }
    if (userNameDisplay) {
      userNameDisplay.textContent = data.user.username;
    }
    if (userPhoneDisplay) {
      userPhoneDisplay.textContent = data.user.phone ? '手机号：' + data.user.phone : '';
    }
  } else {
    userInfoCard.style.display = 'none';
    loginCard.style.display = 'block';
  }
}

// PWA Service Worker注册
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then((registration) => {
        console.log('Service Worker registered: ', registration.scope);
      })
      .catch((error) => {
        console.log('Service Worker registration failed: ', error);
      });
  });
}

</script>
